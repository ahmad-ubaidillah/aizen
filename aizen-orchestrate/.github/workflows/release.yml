name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ZIG_VERSION: "0.16.0"

on:
  push:
    tags: ['v*']

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            zig_target: x86_64-linux-musl
            ext: ""
          - os: ubuntu-latest
            target: linux-aarch64
            zig_target: aarch64-linux-musl
            ext: ""
          - os: ubuntu-latest
            target: linux-riscv64
            zig_target: riscv64-linux-musl
            ext: ""
          - os: macos-latest
            target: macos-aarch64
            zig_target: aarch64-macos
            ext: ""
          - os: macos-latest
            target: macos-x86_64
            zig_target: x86_64-macos
            ext: ""
          - os: windows-latest
            target: windows-x86_64
            zig_target: x86_64-windows
            ext: ".exe"
          - os: windows-latest
            target: windows-aarch64
            zig_target: aarch64-windows
            ext: ".exe"

    steps:
      - uses: actions/checkout@v6

      - name: Install Zig 0.16.0
        run: bash .github/scripts/install-zig.sh "${ZIG_VERSION}"

      - name: Build ReleaseSmall
        run: zig build -Doptimize=ReleaseSmall ${{ matrix.zig_target && format('-Dtarget={0}', matrix.zig_target) || '' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: aizen-orchestrate-${{ matrix.target }}
          path: zig-out/bin/aizen-orchestrate${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8

      - name: Rename binaries
        run: |
          mv aizen-orchestrate-linux-x86_64/aizen-orchestrate aizen-orchestrate-linux-x86_64.bin
          mv aizen-orchestrate-linux-aarch64/aizen-orchestrate aizen-orchestrate-linux-aarch64.bin
          mv aizen-orchestrate-linux-riscv64/aizen-orchestrate aizen-orchestrate-linux-riscv64.bin
          mv aizen-orchestrate-macos-aarch64/aizen-orchestrate aizen-orchestrate-macos-aarch64.bin
          mv aizen-orchestrate-macos-x86_64/aizen-orchestrate aizen-orchestrate-macos-x86_64.bin
          mv aizen-orchestrate-windows-x86_64/aizen-orchestrate.exe aizen-orchestrate-windows-x86_64.exe
          mv aizen-orchestrate-windows-aarch64/aizen-orchestrate.exe aizen-orchestrate-windows-aarch64.exe

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            aizen-orchestrate-linux-x86_64.bin
            aizen-orchestrate-linux-aarch64.bin
            aizen-orchestrate-linux-riscv64.bin
            aizen-orchestrate-macos-aarch64.bin
            aizen-orchestrate-macos-x86_64.bin
            aizen-orchestrate-windows-x86_64.exe
            aizen-orchestrate-windows-aarch64.exe
          generate_release_notes: true

  docker:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{raw}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
